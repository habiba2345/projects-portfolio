{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Amazon Mini</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #800000 0%, #FFC0CB 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 380px;
            text-align: center;
            border: 3px solid #FFC0CB;
        }

            .login-card h2 {
                color: #800000;
                margin-bottom: 10px;
                font-size: 28px;
            }

            .login-card p {
                color: #666;
                font-size: 14px;
                margin-bottom: 30px;
            }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

            .form-group label {
                display: block;
                margin-bottom: 8px;
                color: #800000;
                font-weight: bold;
                font-size: 14px;
            }

            .form-group input {
                width: 100%;
                padding: 12px;
                border: 2px solid #eee;
                border-radius: 10px;
                box-sizing: border-box;
                outline: none;
                transition: 0.3s;
            }

                .form-group input:focus {
                    border-color: #FFC0CB;
                    box-shadow: 0 0 8px rgba(255, 192, 203, 0.5);
                }

        .save-btn {
            width: 100%;
            padding: 14px;
            background: #800000;
            color: #FFC0CB;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

            .save-btn:hover {
                background: #a52a2a;
                transform: translateY(-2px);
                box-shadow: 0 5px 15px rgba(128, 0, 0, 0.3);
            }

        .logo-icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-icon">🛍️</div>
        <h2>Amazon Mini</h2>
        <p>Create your account to start shopping</p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter your name..." required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter secure password..." required>
            </div>

            <button type="submit" class="save-btn">Save & Explore Store</button>
        </form>
    </div>

</body>
</html>
