{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h2 style="color: #800000;">Shopping Cart</h2>
    <table class="table">
        <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
            </tr>
        </thead>
        <tbody>
            {% for item in cart_items %}
            <tr>
                <td>{{ item.product.name }}</td>
                <td>{{ item.product.price }}</td>
                <td>{{ item.quantity }}</td>
            </tr>
            {% empty %}
            <tr><td colspan="3">Cart is empty</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
